name: ShellCheck

on:
  push:
    branches:
      - main
      - test/**
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Show ShellCheck version
        run: shellcheck --version

      - name: Run ShellCheck
        shell: bash
        run: |
          set -Eeuo pipefail

          mapfile -t files < <(
            find . \
              -type f \
              \( -name "*.sh" -o -path "./ct/*" -o -path "./install/*" -o -path "./host/*" \) \
              ! -path "./.git/*" \
              | sort -u
          )

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No shell files found."
            exit 0
          fi

          printf 'Checking %s\n' "${files[@]}"
          shellcheck -x "${files[@]}"
